name: Deploy to Linux Server

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull, rebuild, and restart services
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH reachability
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
        run: |
          set -Eeuo pipefail
          echo "Checking SSH reachability on port ${SERVER_PORT}"
          nc -vz -w 10 "${SERVER_HOST}" "${SERVER_PORT}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          script: |
            set -Eeuo pipefail
            trap 'echo "::error::Deployment failed at line $LINENO while running: $BASH_COMMAND"' ERR

            echo "== Deployment target =="
            hostname
            whoami
            date -Is

            echo "== Checking required commands =="
            command -v git
            command -v docker
            command -v node
            command -v npm
            if ! command -v pm2; then
              echo "::error::pm2 is not available for user $(whoami). Install it on the server with: sudo npm install -g pm2"
              echo "PATH=$PATH"
              npm config get prefix || true
              exit 1
            fi
            docker compose version

            echo "== Entering project directory =="
            cd /opt/rag-proposal
            pwd

            echo "== Checking server-only files =="
            test -f .env
            test -d /opt/models

            echo "== Pulling latest main =="
            git status --short
            if git ls-files --error-unmatch .env >/dev/null 2>&1; then
              cp .env /tmp/rag-proposal.env
              git checkout -- .env
            fi
            git pull origin main
            if test -f /tmp/rag-proposal.env; then
              mv /tmp/rag-proposal.env .env
            fi

            echo "== Validating Docker Compose config =="
            docker compose config --quiet

            echo "== Preparing frontend environment =="
            export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-/api}"
            export NEXT_PUBLIC_RAG_ENABLED_PLUGINS="${NEXT_PUBLIC_RAG_ENABLED_PLUGINS:-proposal}"
            export BACKEND_URL="${BACKEND_URL:-http://127.0.0.1:8088}"

            echo "== Installing frontend dependencies =="
            cd /opt/rag-proposal/frontend
            npm ci

            echo "== Cleaning previous frontend build =="
            if ! rm -rf .next; then
              echo "::error::Cannot remove /opt/rag-proposal/frontend/.next. Fix ownership with: sudo chown -R $(whoami):$(whoami) /opt/rag-proposal/frontend/.next"
              exit 1
            fi

            echo "== Building frontend =="
            npm run build

            echo "== Restarting frontend with PM2 =="
            pm2 reload rag-proposal-frontend --update-env || pm2 start npm --name rag-proposal-frontend -- start
            pm2 save

            echo "== Rebuilding and restarting Docker Compose services =="
            cd /opt/rag-proposal
            docker compose down
            docker compose up -d --build

            echo "== Service status =="
            docker compose ps
            pm2 status rag-proposal-frontend
