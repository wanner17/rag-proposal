services:

  # ─── 인프라 ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest   # arm64 지원 공식 이미지
    restart: unless-stopped
    volumes:
      - ./volumes/qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 애플리케이션 ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LLM_HOST: http://host.docker.internal:8080/v1
      EMBEDDING_HOST: http://host.docker.internal:8001
      RERANKER_HOST: http://host.docker.internal:8002
      QDRANT_HOST: http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8088:8000"
    volumes:
      - ./volumes/backend_data:/app/data
      - ./volumes/documents:/app/documents
      - ${RAG_SOURCE_BASE_PATH:-/opt/rag-projects}:/opt/rag-projects

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
