services:

  # ─── 인프라 ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest   # arm64 지원 공식 이미지
    restart: unless-stopped
    volumes:
      - ./volumes/qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 애플리케이션 ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # vLLM/Embedding/Reranker는 호스트에서 실행 → host.docker.internal로 접근
      VLLM_HOST: http://host.docker.internal:8080/v1
      EMBEDDING_HOST: http://host.docker.internal:8001
      RERANKER_HOST: http://host.docker.internal:8002
      QDRANT_HOST: http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux에서 호스트 접근용
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./volumes/documents:/app/documents     # 문서 업로드 저장소

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine    # arm64 지원
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  qdrant_data:
