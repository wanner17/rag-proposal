services:

  # ─── 인프라 ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest   # arm64 지원 공식 이미지
    restart: unless-stopped
    volumes:
      - ./volumes/qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 애플리케이션 ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # llama.cpp(OpenAI 호환 LLM)/Embedding/Reranker는 호스트에서 실행 → host.docker.internal로 접근
      LLM_HOST: http://host.docker.internal:8080/v1
      EMBEDDING_HOST: http://host.docker.internal:8001
      RERANKER_HOST: http://host.docker.internal:8002
      QDRANT_HOST: http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux에서 호스트 접근용
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8088:8000"   # MuseTalk이 8000 점유 중이라 8088 사용
    cap_add:
      - NET_ADMIN
    volumes:
      - ./volumes/backend_data:/app/data       # 프로젝트/소스 인덱스 SQLite 상태
      - ./volumes/documents:/app/documents     # 문서 업로드 저장소
      - ${RAG_SOURCE_BASE_PATH:-/opt/rag-projects}:/opt/rag-projects  # SVN checkout 대상 (쓰기 필요)
      - /etc/ipsec.conf:/etc/ipsec.conf:ro
      - /etc/ipsec.d:/etc/ipsec.d:ro
      - /etc/xl2tpd:/etc/xl2tpd:ro
      - /var/run/xl2tpd:/var/run/xl2tpd

  nginx:
    image: nginx:alpine    # arm64 지원
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # nginx 컨테이너에서 호스트 PM2 frontend 접근
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
